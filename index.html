<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렌탈 상품 스마트 조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        .filter-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .product-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-blue-600">RentalHub</h1>
            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="#" class="hover:text-blue-500">정수기</a>
                <a href="#" class="hover:text-blue-500">공기청정기</a>
                <a href="#" class="hover:text-blue-500 text-gray-400">마이페이지</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        <!-- Sidebar Filters -->
        <aside class="w-full lg:w-1/4">
            <form id="filterForm" class="filter-card p-6 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">상세 필터</h2>
                    <button type="button" onclick="resetFilters()" class="text-sm text-gray-400 hover:text-blue-500 underline">초기화</button>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-3">약정 기간</label>
                    <div class="grid grid-cols-2 gap-2" id="contractGroup">
                        <label class="flex items-center justify-center p-2 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-200">
                            <input type="checkbox" class="hidden" name="contract" value="3년">
                            <span class="text-sm">3년</span>
                        </label>
                        <label class="flex items-center justify-center p-2 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-200">
                            <input type="checkbox" class="hidden" name="contract" value="5년">
                            <span class="text-sm">5년</span>
                        </label>
                        <label class="flex items-center justify-center p-2 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-200">
                            <input type="checkbox" class="hidden" name="contract" value="6년">
                            <span class="text-sm">6년</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-3">브랜드</label>
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="brand" value="코웨이" class="w-4 h-4"> 코웨이</label>
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="brand" value="SK매직" class="w-4 h-4"> SK매직</label>
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="brand" value="LG전자" class="w-4 h-4"> LG전자</label>
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="brand" value="쿠쿠" class="w-4 h-4"> 쿠쿠</label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-3">월 렌탈료 (원)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="minPrice" placeholder="최소" class="w-full border p-2 rounded text-sm outline-none focus:border-blue-500">
                        <span>~</span>
                        <input type="number" id="maxPrice" placeholder="최대" class="w-full border p-2 rounded text-sm outline-none focus:border-blue-500">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    상품 검색하기
                </button>
            </form>
        </aside>

        <!-- Product List Section -->
        <section class="w-full lg:w-3/4">
            <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg bg-yellow-50 text-yellow-700 text-sm border border-yellow-200"></div>
            
            <div class="flex items-center justify-between mb-6">
                <p class="text-gray-600 font-medium">검색 결과: <span id="productCount" class="text-blue-600">0</span>개</p>
                <select id="sortOrder" class="border rounded-lg px-3 py-1.5 text-sm bg-white outline-none" onchange="fetchProducts()">
                    <option value="created_at">최신순</option>
                    <option value="price_asc">낮은가격순</option>
                </select>
            </div>

            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

            <div id="noResults" class="hidden flex-col items-center justify-center py-20 text-gray-400">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <p>일치하는 상품이 없거나 연결 설정이 필요합니다.</p>
            </div>
        </section>
    </main>

    <script>
        // 1. Supabase 접속 정보 반영
        const SUPABASE_URL = 'https://sdxtxskdwyohlqqgglpj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_JPCveUmMXhJrXd1vhkHBuQ_gDupA828'; 

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function init() {
            try {
                // RLS(Row Level Security) 설정에 따라 익명 세션이 필요할 수 있습니다.
                await supabase.auth.signInAnonymously();
                await fetchProducts();
            } catch (err) {
                console.error("Initialization error:", err);
                showStatus("시스템 초기화 중 오류가 발생했습니다.");
            }
        }

        function showStatus(msg, isError = true) {
            const el = document.getElementById('statusMessage');
            el.innerText = msg;
            el.classList.remove('hidden');
            if (!isError) {
                el.classList.replace('bg-yellow-50', 'bg-blue-50');
                el.classList.replace('text-yellow-700', 'text-blue-700');
            }
        }

        async function fetchProducts() {
            const grid = document.getElementById('productGrid');
            const countLabel = document.getElementById('productCount');
            const noResults = document.getElementById('noResults');
            const statusMessage = document.getElementById('statusMessage');

            // 로딩 표시
            grid.innerHTML = Array(3).fill(0).map(() => `
                <div class="bg-white border rounded-2xl overflow-hidden p-5 space-y-3">
                    <div class="skeleton h-48 w-full rounded-xl"></div>
                    <div class="skeleton h-4 w-1/4"></div>
                    <div class="skeleton h-6 w-3/4"></div>
                </div>
            `).join('');
            noResults.classList.add('hidden');
            statusMessage.classList.add('hidden');

            try {
                const brands = Array.from(document.querySelectorAll('input[name="brand"]:checked')).map(el => el.value);
                const min = document.getElementById('minPrice').value;
                const max = document.getElementById('maxPrice').value;
                const sort = document.getElementById('sortOrder').value;

                // 쿼리 시작 (테이블명이 'products'라고 가정)
                let query = supabase.from('products').select('*', { count: 'exact' });

                if (brands.length > 0) query = query.in('brand', brands);
                if (min) query = query.gte('monthly_fee', min);
                if (max) query = query.lte('monthly_fee', max);
                
                // 정렬
                if (sort === 'price_asc') query = query.order('monthly_fee', { ascending: true });
                else query = query.order('created_at', { ascending: false });

                const { data, error, count } = await query;

                if (error) throw error;

                countLabel.innerText = count || 0;
                
                if (!data || data.length === 0) {
                    grid.innerHTML = '';
                    noResults.classList.remove('hidden');
                } else {
                    grid.innerHTML = data.map(p => `
                        <div class="product-card bg-white border rounded-2xl overflow-hidden flex flex-col p-4 shadow-sm">
                            <div class="bg-gray-50 h-48 rounded-xl flex items-center justify-center mb-4 overflow-hidden">
                                <img src="${p.image_url || 'https://placehold.co/400x400?text=' + encodeURIComponent(p.name)}" 
                                     alt="${p.name}"
                                     class="max-h-full max-w-full object-contain hover:scale-105 transition-transform duration-300"
                                     onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                            </div>
                            <div class="flex-1 flex flex-col">
                                <div class="mb-2">
                                    <p class="text-xs text-blue-600 font-bold uppercase tracking-wider">${p.brand}</p>
                                    <h3 class="font-bold text-lg text-gray-900 leading-tight">${p.name}</h3>
                                </div>
                                <div class="mt-auto border-t pt-4 flex items-end justify-between">
                                    <div>
                                        <p class="text-[10px] text-gray-400 font-medium">월 렌탈료</p>
                                        <span class="text-xl font-black text-gray-900">${Number(p.monthly_fee || 0).toLocaleString()}원</span>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[10px] text-orange-500 font-bold">최대 혜택</p>
                                        <span class="text-sm font-bold text-orange-600">${p.benefit_amount || 0}만원</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error("Fetch error:", err);
                showStatus(`데이터 조회 실패: ${err.message}. 테이블 'products'가 있는지 확인해주세요.`);
                grid.innerHTML = '';
                countLabel.innerText = '0';
            }
        }

        // 필터 시각 효과 처리
        document.querySelectorAll('input[name="contract"]').forEach(input => {
            input.addEventListener('change', function() {
                const label = this.parentElement;
                if (this.checked) {
                    label.classList.replace('border-gray-200', 'border-blue-600');
                    label.classList.add('bg-blue-600', 'text-white');
                } else {
                    label.classList.replace('border-blue-600', 'border-gray-200');
                    label.classList.remove('bg-blue-600', 'text-white');
                }
            });
        });

        // 폼 제출 이벤트
        document.getElementById('filterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            fetchProducts();
        });

        // 필터 초기화
        function resetFilters() {
            document.getElementById('filterForm').reset();
            document.querySelectorAll('#contractGroup label').forEach(l => {
                l.classList.replace('border-blue-600', 'border-gray-200');
                l.classList.remove('bg-blue-600', 'text-white');
            });
            fetchProducts();
        }

        // 실행
        init();
    </script>
</body>
</html>
