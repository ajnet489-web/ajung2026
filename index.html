<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렌탈 상품 통합 검색 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f5f9;
        }
        .filter-section {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .view-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* 테이블 스타일 정돈 */
        .custom-table tr {
            background-color: white;
            border-bottom: 8px solid #f1f5f9;
        }
        .custom-table td:first-child { border-radius: 1rem 0 0 1rem; }
        .custom-table td:last-child { border-radius: 0 1rem 1rem 0; }
    </style>
</head>
<body class="text-slate-900">

    <header class="bg-white border-b py-6 mb-8">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-3xl font-black text-slate-900 flex items-center gap-3">
                <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg">R</span>
                렌탈 상품 조건 검색
            </h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-20 flex flex-col lg:flex-row gap-10">
        <aside class="w-full lg:w-80 shrink-0">
            <form id="filterForm" class="filter-section p-8 space-y-8 sticky top-10">
                <div class="flex items-center justify-between border-b pb-4">
                    <h2 class="text-lg font-bold">상세 조건</h2>
                    <button type="button" id="btnReset" class="text-xs font-bold text-slate-400 hover:text-indigo-600">초기화</button>
                </div>

                <div class="space-y-4">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest">브랜드 선택</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center justify-center p-3 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-indigo-200 transition-all has-[:checked]:bg-indigo-600 has-[:checked]:text-white has-[:checked]:border-indigo-600">
                            <input type="checkbox" name="brand" value="코웨이" class="hidden brand-checkbox">
                            <span class="text-xs font-bold">코웨이</span>
                        </label>
                        <label class="flex items-center justify-center p-3 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-indigo-200 transition-all has-[:checked]:bg-indigo-600 has-[:checked]:text-white has-[:checked]:border-indigo-600">
                            <input type="checkbox" name="brand" value="SK매직" class="hidden brand-checkbox">
                            <span class="text-xs font-bold">SK매직</span>
                        </label>
                        <label class="flex items-center justify-center p-3 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-indigo-200 transition-all has-[:checked]:bg-indigo-600 has-[:checked]:text-white has-[:checked]:border-indigo-600">
                            <input type="checkbox" name="brand" value="LG전자" class="hidden brand-checkbox">
                            <span class="text-xs font-bold">LG전자</span>
                        </label>
                        <label class="flex items-center justify-center p-3 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-indigo-200 transition-all has-[:checked]:bg-indigo-600 has-[:checked]:text-white has-[:checked]:border-indigo-600">
                            <input type="checkbox" name="brand" value="쿠쿠" class="hidden brand-checkbox">
                            <span class="text-xs font-bold">쿠쿠</span>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest">월 렌탈료 범위</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="minPrice" placeholder="0" class="w-full bg-slate-50 border p-3 rounded-xl text-sm focus:border-indigo-500 outline-none price-input">
                        <span class="text-slate-300">~</span>
                        <input type="number" id="maxPrice" placeholder="최대" class="w-full bg-slate-50 border p-3 rounded-xl text-sm focus:border-indigo-500 outline-none price-input">
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-indigo-600 transition-all">
                    검색 적용하기
                </button>
            </form>
        </aside>

        <section class="flex-1">
            <div id="statusMessage" class="hidden mb-6 p-4 rounded-xl bg-rose-50 text-rose-700 text-sm border border-rose-100"></div>

            <div class="flex items-center justify-between mb-8">
                <div>
                    <p class="text-slate-400 font-bold text-sm">총 <span id="productCount" class="text-indigo-600">0</span>개 상품</p>
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="flex items-center bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                        <button id="btnCardView" class="p-2 rounded-lg bg-indigo-600 text-white transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        </button>
                        <button id="btnTableView" class="p-2 rounded-lg text-slate-400 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        </button>
                    </div>
                    <select id="sortOrder" class="bg-white border rounded-xl px-3 py-2 text-xs font-bold outline-none">
                        <option value="created_at">최신순</option>
                        <option value="price_asc">가격 낮은순</option>
                        <option value="price_desc">가격 높은순</option>
                    </select>
                </div>
            </div>

            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 view-transition"></div>
            
            <div id="productTableWrapper" class="hidden overflow-x-auto view-transition">
                <table class="w-full custom-table border-separate" style="min-width: 900px;">
                    <thead class="text-xs text-slate-400 font-bold uppercase">
                        <tr>
                            <th class="px-6 py-4 text-left">상품명</th>
                            <th class="px-6 py-4 text-left">브랜드</th>
                            <th class="px-6 py-4 text-left">약정기간</th>
                            <th class="px-6 py-4 text-left">타사보상</th>
                            <th class="px-6 py-4 text-left">월 렌탈료</th>
                            <th class="px-6 py-4 text-left">사은품 혜택</th>
                            <th class="px-6 py-4 text-center">문의</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>

            <div id="noResults" class="hidden flex flex-col items-center justify-center py-40 text-slate-400">
                <svg class="w-12 h-12 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="font-bold text-lg">해당 조건의 상품을 찾을 수 없습니다.</p>
                <button type="button" id="btnShowAll" class="mt-2 text-indigo-600 underline text-sm">모든 상품 다시 보기</button>
            </div>
        </section>
    </main>

    <script>
        (function() {
            const SUPABASE_URL = 'https://sdxtxskdwyohlqqgglpj.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_JPCveUmMXhJrXd1vhkHBuQ_gDupA828'; 
            
            if (window.rentalAppInitialized) return;
            window.rentalAppInitialized = true;

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            let currentView = 'card';

            function setView(view) {
                currentView = view;
                const grid = document.getElementById('productGrid');
                const table = document.getElementById('productTableWrapper');
                const btnCard = document.getElementById('btnCardView');
                const btnTable = document.getElementById('btnTableView');

                if (view === 'card') {
                    grid.classList.remove('hidden');
                    table.classList.add('hidden');
                    btnCard.classList.add('bg-indigo-600', 'text-white');
                    btnCard.classList.remove('text-slate-400');
                    btnTable.classList.remove('bg-indigo-600', 'text-white');
                    btnTable.classList.add('text-slate-400');
                } else {
                    grid.classList.add('hidden');
                    table.classList.remove('hidden');
                    btnTable.classList.add('bg-indigo-600', 'text-white');
                    btnTable.classList.remove('text-slate-400');
                    btnCard.classList.remove('bg-indigo-600', 'text-white');
                    btnCard.classList.add('text-slate-400');
                }
            }

            async function fetchProducts() {
                const grid = document.getElementById('productGrid');
                const tableBody = document.getElementById('productTableBody');
                const countLabel = document.getElementById('productCount');
                const noResults = document.getElementById('noResults');

                grid.innerHTML = Array(6).fill(0).map(() => `<div class="skeleton h-64 rounded-2xl"></div>`).join('');
                tableBody.innerHTML = '';

                try {
                    const brands = Array.from(document.querySelectorAll('.brand-checkbox:checked')).map(el => el.value);
                    const min = document.getElementById('minPrice').value;
                    const max = document.getElementById('maxPrice').value;
                    const sort = document.getElementById('sortOrder').value;

                    let query = supabase.from('products').select('*', { count: 'exact' });

                    if (brands.length > 0) query = query.in('brand', brands);
                    if (min) query = query.gte('monthly_fee', min);
                    if (max) query = query.lte('monthly_fee', max);
                    
                    if (sort === 'price_asc') query = query.order('monthly_fee', { ascending: true });
                    else if (sort === 'price_desc') query = query.order('monthly_fee', { ascending: false });
                    else query = query.order('created_at', { ascending: false });

                    const { data, error, count } = await query;
                    if (error) throw error;

                    countLabel.innerText = count || 0;
                    
                    if (!data || data.length === 0) {
                        grid.innerHTML = '';
                        noResults.classList.remove('hidden');
                    } else {
                        noResults.classList.add('hidden');
                        
                        // 카드형
                        grid.innerHTML = data.map(p => `
                            <div class="bg-white border border-slate-100 rounded-3xl p-5 hover:shadow-xl hover:shadow-indigo-100 transition-all flex flex-col">
                                <div class="h-40 bg-slate-50 rounded-2xl mb-4 flex items-center justify-center overflow-hidden">
                                    <img src="${p.image_url || 'https://placehold.co/400x400?text=' + encodeURIComponent(p.name)}" 
                                         class="max-h-[80%] object-contain"
                                         onerror="this.src='https://placehold.co/400x400?text=Rental'">
                                </div>
                                <div class="flex justify-between items-start mb-1">
                                    <p class="text-[10px] font-black text-indigo-600 tracking-widest uppercase">${p.brand}</p>
                                    <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 rounded text-slate-500">${p.contract_period || '36'}개월</span>
                                </div>
                                <h4 class="font-bold text-slate-900 leading-tight mb-4 flex-1">${p.name}</h4>
                                <div class="flex items-end justify-between border-t pt-4">
                                    <div>
                                        <p class="text-[10px] text-slate-400 font-bold uppercase">월 렌탈료</p>
                                        <span class="text-xl font-black">${Number(p.monthly_fee).toLocaleString()}원</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-xs font-bold text-rose-500">${p.benefit_amount}만 혜택</span>
                                    </div>
                                </div>
                            </div>
                        `).join('');

                        // 표형 (요청하신 5가지 항목 포함)
                        tableBody.innerHTML = data.map(p => `
                            <tr class="hover:bg-indigo-50/30 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <img src="${p.image_url || 'https://placehold.co/50'}" class="w-10 h-10 object-contain bg-slate-50 rounded-lg">
                                        <span class="font-bold text-sm">${p.name}</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4"><span class="text-xs font-bold bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md">${p.brand}</span></td>
                                <td class="px-6 py-4 text-sm font-medium text-slate-600">${p.contract_period || '36'}개월</td>
                                <td class="px-6 py-4">
                                    <span class="text-xs font-bold ${p.other_company_reward ? 'text-emerald-600' : 'text-slate-300'}">
                                        ${p.other_company_reward ? '● 가능' : '○ 해당없음'}
                                    </span>
                                </td>
                                <td class="px-6 py-4 font-bold text-sm text-indigo-600">${Number(p.monthly_fee).toLocaleString()}원</td>
                                <td class="px-6 py-4 font-bold text-rose-500 text-sm">${p.benefit_amount}만원 상당</td>
                                <td class="px-6 py-4 text-center">
                                    <button class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 transition-all">상담문의</button>
                                </td>
                            </tr>
                        `).join('');
                    }
                } catch (err) {
                    const el = document.getElementById('statusMessage');
                    el.innerText = "데이터 조회 실패: " + err.message;
                    el.classList.remove('hidden');
                }
            }

            function resetFilters() {
                document.getElementById('filterForm').reset();
                fetchProducts();
            }

            document.getElementById('filterForm').addEventListener('submit', (e) => {
                e.preventDefault();
                fetchProducts();
            });

            document.getElementById('btnReset').addEventListener('click', resetFilters);
            document.getElementById('btnShowAll').addEventListener('click', resetFilters);
            document.getElementById('btnCardView').addEventListener('click', () => setView('card'));
            document.getElementById('btnTableView').addEventListener('click', () => setView('table'));
            document.getElementById('sortOrder').addEventListener('change', fetchProducts);

            document.querySelectorAll('.brand-checkbox').forEach(el => {
                el.addEventListener('change', fetchProducts);
            });
            document.querySelectorAll('.price-input').forEach(el => {
                el.addEventListener('input', fetchProducts);
            });

            async function init() {
                try {
                    await supabase.auth.signInAnonymously();
                    await fetchProducts();
                } catch (err) {
                    console.error(err);
                }
            }

            init();
        })();
    </script>
</body>
</html>
