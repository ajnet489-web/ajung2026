<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담원 실적 분석 대시보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const DEFAULT_URL = "https://sdxtxskdwyohlqqgglpj.supabase.co";
        const DEFAULT_KEY = "sb_publishable_JPCveUmMXhJrXd1vhkHBuQ_gDupA828";

        const App = () => {
            const [url, setUrl] = useState(DEFAULT_URL);
            const [apiKey, setApiKey] = useState(DEFAULT_KEY);
            const [status, setStatus] = useState('idle');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [agentsData, setAgentsData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [errorLog, setErrorLog] = useState(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, agentsData, status]);

            const supabase = useMemo(() => {
                if (!window.supabase || !url || !apiKey) return null;
                try {
                    return window.supabase.createClient(url.trim(), apiKey.trim());
                } catch (err) {
                    return null;
                }
            }, [url, apiKey]);

            const fetchPerformanceData = useCallback(async () => {
                if (!supabase) return;
                
                setStatus('connecting');
                setErrorLog(null);

                try {
                    // ERD에 명시된 performance_logs 테이블 사용
                    const { data, error } = await supabase
                        .from('performance_logs')
                        .select(`
                            *,
                            counselors (
                                name,
                                center,
                                part
                            )
                        `);
                    
                    if (error) throw error;

                    if (data && data.length > 0) {
                        const mappedData = data.map(item => {
                            // Supabase Joins는 보통 객체 형태로 데이터를 반환함
                            const counselor = Array.isArray(item.counselors) ? item.counselors[0] : item.counselors;
                            
                            return {
                                id: item.id,
                                name: counselor?.name || "알 수 없음",
                                center: counselor?.center || "미소속",
                                part: counselor?.part || "-",
                                // ERD 컬럼명 기반 매핑 (numeric -> %)
                                internet: item.internet_success_rate ? (item.internet_success_rate * 100).toFixed(1) : 0,
                                rental: item.rental_success_rate ? (item.rental_success_rate * 100).toFixed(1) : 0,
                                usim: item.usim_conversion_rate ? (item.usim_conversion_rate * 100).toFixed(1) : 0,
                                incentive: item.total_incentive?.toLocaleString() || 0,
                                rank: item.margin_rank || '-'
                            };
                        });
                        setAgentsData(mappedData);
                        setStatus('success');
                    } else {
                        // 데이터가 아예 없는 경우 샘플 데이터로 레이아웃 확인
                        setAgentsData(getMockData());
                        setStatus('success');
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                    setStatus('error');
                    setErrorLog(err.message);
                    setAgentsData(getMockData());
                }
            }, [supabase]);

            useEffect(() => {
                if (supabase) fetchPerformanceData();
            }, [supabase, fetchPerformanceData]);

            const filteredAgents = agentsData.filter(agent => 
                agent.name?.toString().includes(searchTerm) || 
                agent.center?.toString().includes(searchTerm)
            );

            function getMockData() {
                return [
                    { id: 1, name: "안선미", center: "덕천센터", part: "1팀", internet: 21.7, rental: 40.5, usim: 18.9, incentive: "274,684", rank: 105 },
                    { id: 2, name: "박소연", center: "덕천센터", part: "1팀", internet: 35.2, rental: 25.0, usim: 28.9, incentive: "850,000", rank: 54 },
                ];
            }

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 flex">
                    {/* 사이드바 */}
                    <aside className="w-64 bg-slate-900 text-white flex flex-col hidden md:flex shrink-0">
                        <div className="p-8">
                            <div className="flex items-center gap-3 mb-10">
                                <div className="bg-blue-500 p-2 rounded-xl text-white shadow-lg shadow-blue-500/20">
                                    <i data-lucide="trending-up" size="20"></i>
                                </div>
                                <span className="font-black text-xl tracking-tight">실적 마스터</span>
                            </div>
                            
                            <nav className="space-y-2">
                                {['dashboard', 'analytics', 'settings'].map((tab) => (
                                    <button 
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === tab ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'text-slate-400 hover:bg-slate-800'}`}
                                    >
                                        <i data-lucide={tab === 'dashboard' ? 'layout-dashboard' : tab === 'analytics' ? 'bar-chart-3' : 'settings'}></i>
                                        <span className="font-bold capitalize">{tab === 'dashboard' ? '대시보드' : tab === 'analytics' ? '분석' : '설정'}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                        
                        <div className="mt-auto p-6 border-t border-slate-800">
                            <div className={`flex items-center gap-3 p-3 rounded-xl ${status === 'success' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                <div className={`w-2 h-2 rounded-full ${status === 'success' ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`} />
                                <span className="text-[10px] font-black uppercase tracking-wider">{status === 'success' ? 'Database Linked' : 'Offline'}</span>
                            </div>
                        </div>
                    </aside>

                    {/* 메인 */}
                    <main className="flex-1 flex flex-col h-screen overflow-y-auto">
                        <header className="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between sticky top-0 z-20">
                            <div className="flex items-center gap-4">
                                <h2 className="text-xl font-black text-slate-800">현황판</h2>
                                <span className="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold">{filteredAgents.length}명 데이터</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative">
                                    <i data-lucide="search" className="absolute left-3 top-2.5 text-slate-400" size="16"></i>
                                    <input 
                                        type="text" 
                                        placeholder="이름 또는 센터 검색..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none w-64 text-sm font-medium"
                                    />
                                </div>
                                <button onClick={fetchPerformanceData} className="p-2.5 bg-slate-100 text-slate-600 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                    <i data-lucide="refresh-cw" className={status === 'connecting' ? 'animate-spin' : ''} size="18"></i>
                                </button>
                            </div>
                        </header>

                        <div className="p-8">
                            {errorLog && (
                                <div className="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl text-rose-600 text-sm font-bold flex items-center gap-3">
                                    <i data-lucide="alert-circle" size="18"></i>
                                    오류 발생: {errorLog} (테이블명이나 RLS 정책을 확인하세요)
                                </div>
                            )}

                            {activeTab === 'dashboard' && (
                                <div className="space-y-8">
                                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-slate-50/50">
                                                    <tr>
                                                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">상담원 정보</th>
                                                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">인터넷 성공</th>
                                                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">렌탈 성공</th>
                                                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">유심 전환</th>
                                                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">인센티브</th>
                                                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">순위</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredAgents.map((agent, idx) => (
                                                        <tr key={agent.id || idx} className="hover:bg-blue-50/30 transition-colors group">
                                                            <td className="px-8 py-5">
                                                                <div className="flex items-center gap-4">
                                                                    <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center font-black text-slate-500 text-sm group-hover:from-blue-500 group-hover:to-indigo-600 group-hover:text-white transition-all">
                                                                        {agent.name[0]}
                                                                    </div>
                                                                    <div>
                                                                        <div className="font-black text-slate-800">{agent.name}</div>
                                                                        <div className="text-[11px] font-bold text-slate-400 uppercase">{agent.center} · {agent.part}</div>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <td className="px-8 py-5 text-center">
                                                                <div className="text-sm font-black text-blue-600">{agent.internet}%</div>
                                                                <div className="w-12 h-1 bg-slate-100 mx-auto rounded-full mt-1 overflow-hidden">
                                                                    <div className="bg-blue-500 h-full" style={{width: `${agent.internet}%`}}></div>
                                                                </div>
                                                            </td>
                                                            <td className="px-8 py-5 text-center font-black text-amber-600 text-sm">{agent.rental}%</td>
                                                            <td className="px-8 py-5 text-center font-black text-emerald-600 text-sm">{agent.usim}%</td>
                                                            <td className="px-8 py-5 text-right font-black text-slate-700 text-sm">{agent.incentive}원</td>
                                                            <td className="px-8 py-5 text-center">
                                                                <span className="bg-slate-100 text-slate-500 text-[10px] font-black px-2 py-1 rounded-md">
                                                                    {agent.rank}위
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="max-w-xl mx-auto space-y-6">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-200">
                                        <h3 className="text-xl font-black mb-6">연결 매개변수</h3>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Project URL</label>
                                                <input type="text" value={url} onChange={(e)=>setUrl(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-none font-mono text-xs focus:ring-2 focus:ring-blue-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Anon Key</label>
                                                <textarea rows="3" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-none font-mono text-[10px] focus:ring-2 focus:ring-blue-500 outline-none resize-none" />
                                            </div>
                                            <button onClick={fetchPerformanceData} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm hover:bg-black transition-all">설정 저장 및 새로고침</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
